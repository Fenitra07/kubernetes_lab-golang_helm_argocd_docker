server {
    listen 80;
    server_name _;

    # ── Fichiers statiques (frontend) ─────────────────────
    root /usr/share/nginx/html;
    index admin-dashboard.html;

    # Toutes les routes inconnues → SPA (prêt pour React plus tard)
    location / {
        try_files $uri $uri/ /admin-dashboard.html;
    }

    # ── Reverse proxy vers l'API Go ───────────────────────
    # En Docker Compose : le backend s'appelle "app"
    # En Kubernetes     : le backend s'appelle "admin-dashboard-service"
    location /api/ {
        proxy_pass http://app:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── Sécurité basique ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mysql.serviceName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-dashboard.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "admin-dashboard.mysqlSelectorLabels" . | nindent 4 }}
  ports:
    - name: mysql
      port: {{ .Values.mysql.port }}
      targetPort: {{ .Values.mysql.port }}
  type: ClusterIP

apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-webapp-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "admin-dashboard.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}-webapp
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

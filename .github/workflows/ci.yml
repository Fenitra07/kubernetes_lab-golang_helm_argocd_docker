name: CI — Build & Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: Fenitra0011
  BACKEND_IMAGE: fenitra0011/admin-dashboard
  WEBAPP_IMAGE: fenitra0011/admin-dashboard-webapp

jobs:
  # ── 1. Tests Go ────────────────────────────────────────────
  test:
    name: Tests Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run tests
        working-directory: server
        run: go test ./... -v

  # ── 2. Build & Push images Docker ──────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Image backend Go ──────────────────────────────────
      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Image frontend Nginx ──────────────────────────────
      - name: Build & Push webapp
        uses: docker/build-push-action@v5
        with:
          context: ./webApp
          file: ./webApp/Dockerfile
          push: true
          tags: ${{ env.WEBAPP_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Résumé ────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### ✅ Images publiées" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.BACKEND_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.WEBAPP_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY

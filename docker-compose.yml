version: "3.9"

services:

  # ── Base de données ─────────────────────────────────────
  db:
    image: mysql:8.1
    container_name: admin-dashboard-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: admin-dashboard
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Go ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: admin-dashboard-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ROOT_FOLDER: /app
      DB_DSN: root:root@tcp(db:3306)/admin-dashboard?parseTime=true&loc=Local&charset=utf8mb4&collation=utf8mb4_unicode_ci
      API_HOST: 0.0.0.0
      API_PORT: "8081"
    # En local uniquement — en prod, l'accès passe par Nginx
    ports:
      - "8081:8081"
    volumes:
      - ./server/configs:/app/configs:ro
      - ./server/sql:/app/sql:ro

  # ── Frontend Nginx ──────────────────────────────────────
  webapp:
    build:
      context: ./webApp
      dockerfile: Dockerfile
    container_name: admin-dashboard-webapp
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    # nginx.conf fait le proxy /api/ → app:8081

volumes:
  db_data:
